name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages on every push to main.
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   VITE_SUPABASE_URL          = https://upvdcmjyyewgdvjcizbt.supabase.co
#   VITE_SUPABASE_ANON_KEY     = sb_publishable_...   (the publishable key only)
# These are public-by-design (they ship in the browser bundle); never put a
# secret/service-role key here — the build's check-bundle step will fail if one leaks.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Runs on every push and pull request. Gates the build/deploy below so a change
  # that breaks lint or the unit tests can't reach main or the live Pages site.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test

  build:
    needs: test
    # Only build + publish from main; pull requests stop after the test job.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
